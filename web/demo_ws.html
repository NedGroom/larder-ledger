WQ<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>LarderLedger WS Demo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: system-ui, -apple-system, Roboto, sans-serif; padding: 1rem; }
    #log { white-space: pre-wrap; background:#f5f5f5; padding:1rem; border-radius:6px; max-height:60vh; overflow:auto }
    button { margin-top: 0.5rem }
  </style>
</head>
<body>
  <h1>LarderLedger WebSocket Demo</h1>
  <label>Backend URL: <input id="url" value="ws://127.0.0.1:8000" style="width:260px"></label>
  <label>House ID: <input id="house" value="1" style="width:64px"></label>
  <div>
    <button id="connect">Connect</button>
    <button id="send">Send test event</button>
  </div>
  <h3>Log</h3>
  <div id="log"></div>

  <script>
    let ws;
    const log = (m) => { const e = document.getElementById('log'); e.textContent = (new Date()).toLocaleTimeString() + '   ' + m + '\n' + e.textContent }

    document.getElementById('connect').addEventListener('click', () => {
      const url = document.getElementById('url').value.replace(/\/$/, '');
      const house = document.getElementById('house').value || '1';
      const wsUrl = `${url}/ws/houses/${house}`;
      try { ws && ws.close() } catch(e){}
      ws = new WebSocket(wsUrl);
      ws.onopen = () => log('connected to ' + wsUrl);
      ws.onclose = () => log('closed');
      ws.onerror = (e) => log('error '+JSON.stringify(e));
      ws.onmessage = (ev) => log('recv: ' + ev.data);
    })

    document.getElementById('send').addEventListener('click', () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) { alert('connect first'); return }
      const payload = { type: 'ui.test', msg: 'hello from demo' };
      ws.send(JSON.stringify(payload));
      log('sent: ' + JSON.stringify(payload));
    })
  </script>
</body>
</html>

<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>LarderLedger Supabase Demo</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body{font-family:system-ui, -apple-system, Roboto, sans-serif;padding:1rem}
    input,button,select{padding:.4rem;margin:.2rem}
    #log{white-space:pre-wrap;background:#f7f7f7;padding:1rem;border-radius:6px;max-height:40vh;overflow:auto}
  </style>
</head>
<body>
  <h1>LarderLedger — Supabase Demo (no realtime)</h1>
  <p>Replace SUPABASE_URL and SUPABASE_KEY below with your project values.</p>

  <div>
    <label>Supabase URL <input id="sb-url" value="YOUR_SUPABASE_URL"></label>
    <label>Anon Key <input id="sb-key" value="YOUR_SUPABASE_ANON_KEY" style="width:420px"></label>
    <button id="init">Init</button>
  </div>

  <div id="auth" style="margin-top:1rem;display:none">
    <h3>Auth</h3>
    <input id="email" placeholder="email">
    <input id="password" placeholder="password" type="password">
    <button id="signup">Sign up</button>
    <button id="signin">Sign in</button>
    <button id="signout">Sign out</button>
    <div id="me"></div>
  </div>

  <div id="houses" style="display:none;margin-top:1rem">
    <h3>Houses</h3>
    <input id="house-name" placeholder="House name">
    <button id="create-house">Create House</button>
    <div id="house-list"></div>
  </div>

  <div id="ingredients" style="display:none;margin-top:1rem">
    <h3>Ingredients (select house)</h3>
    <select id="house-select"></select>
    <div>
      <input id="ing-name" placeholder="Name">
      <input id="ing-unit" placeholder="Unit (g/ml)">
      <button id="create-ing">Create Ingredient</button>
    </div>
    <div id="ing-list"></div>
  </div>

  <h3>Log</h3>
  <div id="log"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.js"></script>
  <script>
    let supabase;
    const log = (m) => { const e = document.getElementById('log'); e.textContent = (new Date()).toLocaleTimeString() + '  ' + m + '\n' + e.textContent }

    document.getElementById('init').addEventListener('click', async () => {
      const url = document.getElementById('sb-url').value.trim();
      const key = document.getElementById('sb-key').value.trim();
      if(!url||!key){ alert('set URL and KEY'); return }
      supabase = supabasejs.createClient(url, key);
      document.getElementById('auth').style.display='block';
      document.getElementById('houses').style.display='block';
      document.getElementById('ingredients').style.display='block';
      log('Supabase client initialized');
      const session = supabase.auth.session();
      showUser(session && session.user);
      supabase.auth.onAuthStateChange((event, session) => showUser(session && session.user));
      await loadHouses();
    });

    async function showUser(user){
      const el = document.getElementById('me');
      if(!user){ el.textContent='not signed in'; return }
      el.textContent = `signed in: ${user.email} (id: ${user.id})`;
    }

    document.getElementById('signup').addEventListener('click', async ()=>{
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { user, error } = await supabase.auth.signUp({ email, password });
      if(error) return log('signup error: '+error.message);
      log('signup ok: '+user.email);
    });
    document.getElementById('signin').addEventListener('click', async ()=>{
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { user, error } = await supabase.auth.signIn({ email, password });
      if(error) return log('signin error: '+error.message);
      log('signin ok: '+user.email);
      await ensureUserRow(user);
      await loadHouses();
    });
    document.getElementById('signout').addEventListener('click', async ()=>{
      await supabase.auth.signOut();
      log('signed out');
      showUser(null);
    });

    async function ensureUserRow(user){
      if(!user) return;
      // upsert into users table
      await supabase.from('users').upsert({ id: user.id, email: user.email, name: user.user_metadata?.full_name || null });
    }

    document.getElementById('create-house').addEventListener('click', async ()=>{
      const name = document.getElementById('house-name').value.trim();
      if(!name) return alert('name');
      const { data, error } = await supabase.from('houses').insert([{ name }]).single();
      if(error) return log('create house error: '+error.message);
      // add membership for current user
      const user = supabase.auth.user();
      await supabase.from('house_users').insert([{ house_id: data.id, user_id: user.id, role: 'owner' }]);
      log('created house '+data.id);
      await loadHouses();
    });

    async function loadHouses(){
      const { data, error } = await supabase.from('houses').select('*');
      if(error) return log('load houses error: '+error.message);
      const sel = document.getElementById('house-select'); sel.innerHTML='';
      const list = document.getElementById('house-list'); list.innerHTML='';
      data.forEach(h => {
        const opt = document.createElement('option'); opt.value = h.id; opt.textContent = `${h.id} - ${h.name}`;
        sel.appendChild(opt);
        const div = document.createElement('div'); div.textContent = `${h.id}: ${h.name}`; list.appendChild(div);
      });
      if(data[0]){
        sel.value = data[0].id;
        await loadIngredients(data[0].id);
      }
    }

    document.getElementById('house-select').addEventListener('change', async (e)=>{
      await loadIngredients(e.target.value);
    });

    document.getElementById('create-ing').addEventListener('click', async ()=>{
      const houseId = parseInt(document.getElementById('house-select').value,10);
      const name = document.getElementById('ing-name').value.trim();
      const canonical = document.getElementById('ing-unit').value.trim();
      if(!name) return alert('name');
      const normalized = name.trim().toLowerCase();
      const { data, error } = await supabase.from('ingredients').insert([{ house_id: houseId, name, name_normalized: normalized, canonical_unit: canonical }]).single();
      if(error) return log('create ing error: '+error.message);
      log('created ingredient '+data.id);
      await loadIngredients(houseId);
    });

    async function loadIngredients(houseId){
      const { data, error } = await supabase.from('ingredients').select('*').eq('house_id', houseId).order('name');
      const el = document.getElementById('ing-list'); el.innerHTML = '';
      if(error) return log('load ing error: '+error.message);
      data.forEach(i => {
        const row = document.createElement('div');
        const cb = document.createElement('input'); cb.type='checkbox'; cb.checked = i.has_any;
        cb.addEventListener('change', async ()=>{
          // last-writer-wins: just update has_any and updated_at
          const { data:upd, error:err } = await supabase.from('ingredients').update({ has_any: cb.checked }).eq('id', i.id).single();
          if(err) log('update error '+err.message); else { log('updated '+i.id); await loadIngredients(houseId); }
        });
        row.appendChild(cb);
        const t = document.createElement('span'); t.textContent = ` ${i.name} (${i.canonical_unit || ''}) updated_at: ${i.updated_at}`;
        row.appendChild(t);
        el.appendChild(row);
      });
    }

    // Receipt upload example (direct upload to Supabase Storage)
    async function uploadReceipt(file, houseId){
      const filename = `${houseId}/${Date.now()}_${file.name}`;
      const { data, error } = await supabase.storage.from('receipts').upload(filename, file);
      if(error) return log('upload error: '+error.message);
      // create receipt metadata row
      await supabase.from('receipts').insert([{ house_id: houseId, path: data.Key || filename }]);
      log('uploaded receipt '+filename);
    }

    // simple file input to demo
    const fileInput = document.createElement('input'); fileInput.type='file';
    fileInput.addEventListener('change', async (e)=>{
      const f = e.target.files[0];
      const houseId = parseInt(document.getElementById('house-select').value,10);
      await uploadReceipt(f, houseId);
    });
    document.body.appendChild(fileInput);

  </script>
</body>
</html>
